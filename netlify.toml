[build]
  command = "npm run build && npm run build:functions"
  publish = "dist"
  functions = ".netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[edge_functions]]
  function = "api"
  path = "/api/*"

[functions]
  api = { kv_namespaces = ["LGT_CHOICES"] }